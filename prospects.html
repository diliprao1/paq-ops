<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAQ Publishing — Prospects</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #141414; --ink2: #2d2d2d; --ink3: #555; --ink4: #888; --ink5: #bbb;
  --paper: #f4f1eb; --paper2: #ede9e1; --paper3: #e5e0d7;
  --rule: #d8d2c8; --rule2: #c8c1b5;
  --gold: #8b6914; --gold-bg: #f7f0de; --gold-border: #5aab78;
  --red: #c0392b; --red-bg: #fdf0ee;
  --amber: #a0570a; --amber-bg: #fdf4e7;
  --green: #1a5c35; --green-bg: #e8f5ee;
  --blue: #1a3d7b; --blue-bg: #e8eef8;
  --purple: #5a2d8a; --purple-bg: #f0eaf8;
  --serif: 'DM Serif Display', serif;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow: 0 2px 8px rgba(0,0,0,0.08);
}
body.dark {
  --ink:#f0ece4; --ink2:#d8d2c8; --ink3:#b0a898; --ink4:#908880; --ink5:#706860;
  --paper:#1c1c1c; --paper2:#242424; --paper3:#2c2c2c;
  --rule:#383838; --rule2:#484848;
  --gold:#d4b060; --gold-bg:#2a2210; --gold-border:#6abf88;
  --red:#f08070; --red-bg:#2c1a1a;
  --amber:#e09840; --amber-bg:#2c2010;
  --green:#60b880; --green-bg:#102818;
  --blue:#78a0e8; --blue-bg:#101828;
  --purple:#a880e8; --purple-bg:#1c1430;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);min-height:100vh;}

/* ── NAV ── */
nav {
  background:#141414;
  border-bottom: 2px solid var(--gold-border);
  display:flex; align-items:center; gap:0;
  padding:0; height:38px; position:sticky; top:0; z-index:100;
}
.nav-logo {
  font-family:var(--serif); font-size:13px; color:#f0ead8;
  padding:0 18px; border-right:1px solid rgba(255,255,255,0.1);
  height:100%; display:flex; align-items:center; white-space:nowrap;
  letter-spacing:0.3px;
}
.nav-links { display:flex; height:100%; }
.nav-link {
  font-family:var(--mono); font-size:9px; letter-spacing:1.2px; text-transform:uppercase;
  color:rgba(255,255,255,0.4); text-decoration:none;
  padding:0 16px; height:100%; display:flex; align-items:center;
  border-right:1px solid rgba(255,255,255,0.06);
  transition:color 0.15s, background 0.15s;
}
.nav-link:hover{color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.04);}
.nav-link.active{color:var(--gold-border); border-bottom:2px solid var(--gold-border); margin-bottom:-2px;}
.nav-right{margin-left:auto; padding:0 14px; display:flex; align-items:center; gap:10px;}
.dark-toggle{
  background:none; border:1px solid rgba(255,255,255,0.18); color:rgba(255,255,255,0.45);
  font-family:var(--mono); font-size:9px; letter-spacing:1px; padding:4px 10px; cursor:pointer;
}
.dark-toggle:hover{border-color:rgba(255,255,255,0.4);color:rgba(255,255,255,0.8);}
body.dark .dark-toggle{border-color:rgba(90,171,120,0.4);color:var(--gold-border);}

/* ── HEADER ── */
header {
  background:#141414; color:#f0ead8;
  border-bottom:1px solid rgba(255,255,255,0.08);
  padding:20px 28px 16px;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;}
.logo-main{font-family:var(--serif);font-size:22px;letter-spacing:-0.3px;}
.logo-sub{font-family:var(--mono);font-size:10px;color:var(--gold-border);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px;}
.hdr-stats{display:flex;gap:0;margin-top:14px;border-top:1px solid rgba(255,255,255,0.06);padding-top:12px;}
.hstat{padding:0 22px 0 0;margin-right:22px;border-right:1px solid rgba(255,255,255,0.08);}
.hstat:last-child{border-right:none;}
.hstat-n{font-family:var(--mono);font-size:20px;font-weight:500;color:#f0ead8;line-height:1;}
.hstat-l{font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:3px;}
.hstat-n.amber{color:#fbbf24;} .hstat-n.green{color:#4ade80;} .hstat-n.red{color:#f87171;}

/* ── TOOLBAR ── */
.toolbar{
  background:var(--paper2); border-bottom:1px solid var(--rule);
  padding:10px 28px; position:sticky; top:38px; z-index:90;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
body.dark .toolbar{background:#202020; border-bottom-color:#363636;}
.srch{position:relative;display:flex;align-items:center;}
.srch-icon{position:absolute;left:9px;font-size:14px;color:var(--ink4);pointer-events:none;}
.srch input{
  font-family:var(--mono);font-size:11px;padding:6px 28px 6px 28px;
  border:1px solid var(--rule2);background:var(--paper);color:var(--ink);width:220px;
  outline:none;
}
.srch input:focus{border-color:var(--gold-border);}
body.dark .srch input{background:#2c2c2c;border-color:#404040;color:var(--ink);}
.srch-clear{position:absolute;right:6px;background:none;border:none;cursor:pointer;color:var(--ink4);font-size:12px;padding:2px 4px;display:none;}
.srch-clear.visible{display:block;}
.tb-select{
  font-family:var(--mono);font-size:10px;padding:6px 10px;
  border:1px solid var(--rule2);background:var(--paper);color:var(--ink);cursor:pointer;
}
body.dark select{background:#2c2c2c;border-color:#404040;color:var(--ink2);}
.add-btn{
  font-family:var(--mono);font-size:10px;letter-spacing:0.5px;
  background:var(--ink);color:var(--paper);border:none;padding:7px 16px;cursor:pointer;
  margin-left:auto;
}
.add-btn:hover{background:var(--ink2);}
body.dark .add-btn{background:#333;color:var(--gold-border);}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 38px - 74px - 57px);}
.main-area{flex:1;padding:24px 28px;overflow-x:auto;}

/* ── PIPELINE VIEW ── */
.pipeline{display:flex;gap:14px;align-items:flex-start;min-height:400px;}
.stage-col{
  flex:0 0 240px; background:var(--paper2); border:1px solid var(--rule);
  border-top:3px solid var(--rule2);
}
body.dark .stage-col{background:#242424;border-color:#363636;}
.stage-col.stage-new{border-top-color:#78a0e8;}
.stage-col.stage-research{border-top-color:#a880e8;}
.stage-col.stage-outreach{border-top-color:#e09840;}
.stage-col.stage-negotiating{border-top-color:#f08070;}
.stage-col.stage-signed{border-top-color:#60b880;}
.stage-col.stage-passed{border-top-color:#606060;}
.stage-hdr{
  padding:10px 12px; display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--rule);
}
body.dark .stage-hdr{border-bottom-color:#363636;}
.stage-title{font-family:var(--mono);font-size:9px;letter-spacing:1.2px;text-transform:uppercase;color:var(--ink3);}
.stage-count{font-family:var(--mono);font-size:9px;background:var(--paper3);color:var(--ink4);padding:2px 7px;border:1px solid var(--rule);}
body.dark .stage-count{background:#303030;border-color:#484848;}
.stage-cards{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:60px;}

/* ── PROSPECT CARD ── */
.pcard{
  background:var(--paper);border:1px solid var(--rule);
  padding:11px 12px; cursor:pointer; transition:all 0.12s;
  border-left:3px solid transparent;
}
body.dark .pcard{background:#2a2a2a;border-color:#404040;}
.pcard:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.pcard.priority-high{border-left-color:var(--red);}
.pcard.priority-med{border-left-color:var(--amber);}
.pcard.priority-low{border-left-color:var(--green);}
.pcard-name{font-family:var(--serif);font-size:13px;color:var(--ink);margin-bottom:2px;}
body.dark .pcard-name{color:var(--ink);}
.pcard-alias{font-family:var(--mono);font-size:9px;color:var(--gold);margin-bottom:6px;}
.pcard-meta{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px;}
.ptag{
  font-family:var(--mono);font-size:8px;padding:2px 6px;
  border:1px solid var(--rule2);color:var(--ink3);background:var(--paper2);
}
body.dark .ptag{background:#333;border-color:#484848;color:var(--ink3);}
.ptag.pro-bmi{background:var(--bmi-bg,#e8eef8);color:#1a4b8c;border-color:#93b0d8;}
.ptag.pro-ascap{background:#f8ebe8;color:#7b2d2d;border-color:#d8a090;}
.ptag.pro-sesac{background:#e8f3ec;color:#2d5c3f;border-color:#90c0a0;}
.ptag.genre{background:var(--paper3);color:var(--ink3);}
body.dark .ptag.genre{background:#303030;color:var(--ink3);}
.pcard-streams{font-family:var(--mono);font-size:8px;color:var(--ink4);display:flex;gap:8px;margin-top:4px;}
.stream-n{color:var(--ink3);font-weight:500;}
.pcard-date{font-family:var(--mono);font-size:8px;color:var(--ink5);margin-top:4px;}

/* ── LIST VIEW ── */
.list-view{display:none;}
.list-view.active{display:block;}
.pipeline-view.hidden{display:none;}
.tbl-wrap{overflow-x:auto;border:1px solid var(--rule);background:var(--paper2);}
body.dark .tbl-wrap{background:var(--paper2);border-color:#363636;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead tr{background:var(--paper3);border-bottom:2px solid var(--rule2);}
th{
  font-family:var(--mono);font-size:8px;letter-spacing:1px;text-transform:uppercase;
  color:var(--ink3);padding:10px 12px;text-align:left;white-space:nowrap;
  border-right:1px solid var(--rule);
}
body.dark thead tr{background:#1a1a1a;}
body.dark th{color:rgba(255,255,255,0.4);border-right-color:rgba(255,255,255,0.05);}
tbody tr{border-bottom:1px solid var(--rule);cursor:pointer;transition:background 0.1s;}
tbody tr:hover{background:var(--gold-bg)!important;}
body.dark tbody tr{background:var(--paper2);border-bottom-color:var(--rule);}
body.dark tbody tr:hover{background:#343434!important;}
td{padding:9px 12px;color:var(--ink2);border-right:1px solid var(--rule);vertical-align:middle;}
body.dark td{color:var(--ink2);border-right-color:var(--rule);}
.td-name{font-family:var(--serif);font-size:12px;color:var(--ink);}
.td-alias{font-family:var(--mono);font-size:9px;color:var(--gold);}

/* Stage badge */
.stage-badge{
  font-family:var(--mono);font-size:8px;letter-spacing:0.8px;text-transform:uppercase;
  padding:3px 8px;border:1px solid;white-space:nowrap;
}
.sb-new{color:#78a0e8;border-color:rgba(120,160,232,0.4);background:rgba(120,160,232,0.08);}
.sb-research{color:#a880e8;border-color:rgba(168,128,232,0.4);background:rgba(168,128,232,0.08);}
.sb-outreach{color:var(--amber);border-color:rgba(160,87,10,0.3);background:var(--amber-bg);}
.sb-negotiating{color:var(--red);border-color:rgba(192,57,43,0.3);background:var(--red-bg);}
.sb-signed{color:var(--green);border-color:rgba(26,92,53,0.3);background:var(--green-bg);}
.sb-passed{color:var(--ink4);border-color:var(--rule2);background:var(--paper3);}
body.dark .sb-new{color:#78a0e8;border-color:rgba(120,160,232,0.3);background:rgba(120,160,232,0.1);}
body.dark .sb-research{color:#a880e8;border-color:rgba(168,128,232,0.3);background:rgba(168,128,232,0.1);}
body.dark .sb-outreach{color:var(--amber);border-color:rgba(224,152,64,0.3);background:var(--amber-bg);}
body.dark .sb-negotiating{color:var(--red);border-color:rgba(240,128,112,0.3);background:var(--red-bg);}
body.dark .sb-signed{color:var(--green);border-color:rgba(96,184,128,0.3);background:var(--green-bg);}
body.dark .sb-passed{color:var(--ink4);border-color:#484848;background:#2c2c2c;}

/* Priority dot */
.pri-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;}
.pri-high{background:var(--red);}
.pri-med{background:var(--amber);}
.pri-low{background:var(--green);}

/* View toggle */
.view-toggle{display:flex;border:1px solid var(--rule2);overflow:hidden;margin-left:8px;}
.vtb{
  font-family:var(--mono);font-size:9px;letter-spacing:0.8px;padding:5px 12px;
  background:none;border:none;cursor:pointer;color:var(--ink3);transition:all 0.1s;
}
.vtb.on{background:var(--ink);color:var(--paper);}
body.dark .view-toggle{background:#2c2c2c;border-color:#404040;}
body.dark .vtb{color:var(--ink3);}
body.dark .vtb.on{background:#444;color:var(--gold-border);}

/* ── DETAIL PANEL ── */
.detail{
  width:340px;flex-shrink:0;border-left:1px solid var(--rule);
  background:var(--paper);overflow-y:auto;
  position:sticky;top:calc(38px + 57px);height:calc(100vh - 38px - 57px - 74px);
  transform:translateX(340px);transition:transform 0.2s;display:none;
}
body.dark .detail{background:#1e1e1e;border-left-color:#363636;}
.detail.open{transform:translateX(0);display:block;}
.detail-hdr{
  background:#141414;padding:16px 18px 14px;
  border-bottom:2px solid var(--gold-border);position:sticky;top:0;z-index:5;
}
#d-name{font-family:var(--serif);font-size:18px;color:#f0ead8;line-height:1.2;}
#d-alias{font-family:var(--mono);font-size:9px;color:var(--gold-border);margin-top:3px;letter-spacing:0.5px;}
.d-hdr-actions{display:flex;gap:6px;margin-top:10px;}
.d-btn{
  font-family:var(--mono);font-size:9px;letter-spacing:0.5px;padding:5px 12px;
  border:1px solid;cursor:pointer;background:none;
}
.d-btn-edit{color:var(--gold-border);border-color:rgba(90,171,120,0.4);}
.d-btn-edit:hover{background:rgba(90,171,120,0.1);}
.d-btn-del{color:#f08070;border-color:rgba(240,128,112,0.3);}
.d-btn-del:hover{background:rgba(240,128,112,0.1);}
.d-btn-convert{color:#60b880;border-color:rgba(96,184,128,0.3);}
.d-btn-convert:hover{background:rgba(96,184,128,0.1);}
.d-body{padding:14px 16px;}
.d-sec{padding:12px 0;border-bottom:1px solid var(--rule);}
body.dark .d-sec{border-bottom-color:#363636;}
.d-sec:last-child{border-bottom:none;}
.d-sec-title{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink4);margin-bottom:8px;}
.d-kv{display:flex;flex-direction:column;gap:6px;}
.d-k{font-family:var(--mono);font-size:9px;color:var(--ink4);}
.d-v{font-family:var(--sans);font-size:11px;color:var(--ink2);margin-top:1px;}
body.dark .d-k{color:var(--ink3);}
body.dark .d-v{color:var(--ink);}
.d-note{
  font-family:var(--sans);font-size:11px;color:var(--ink2);
  background:var(--paper2);border:1px solid var(--rule);padding:8px 10px;
  margin-top:6px;line-height:1.5;
}
body.dark .d-note{background:#2c2c2c;border-color:#484848;color:var(--ink2);}
.d-note-empty{color:var(--ink5);font-style:italic;}
textarea.d-textarea{
  width:100%;font-family:var(--sans);font-size:11px;color:var(--ink);
  background:var(--paper);border:1px solid var(--rule2);padding:8px;
  resize:vertical;min-height:80px;outline:none;margin-top:6px;
}
textarea.d-textarea:focus{border-color:var(--gold-border);}
body.dark textarea.d-textarea{background:#2c2c2c;border-color:#484848;color:var(--ink);}
.d-save-btn{
  font-family:var(--mono);font-size:9px;padding:5px 12px;
  background:var(--green-bg);color:var(--green);border:1px solid rgba(26,92,53,0.3);
  cursor:pointer;margin-top:6px;
}
body.dark .d-save-btn{background:var(--green-bg);color:var(--green);border-color:rgba(96,184,128,0.3);}
.outreach-list{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.outreach-item{
  background:var(--paper2);border:1px solid var(--rule);
  padding:8px 10px;font-family:var(--sans);font-size:11px;
}
body.dark .outreach-item{background:#2c2c2c;border-color:#404040;}
.outreach-date{font-family:var(--mono);font-size:8px;color:var(--ink4);margin-bottom:3px;}
.outreach-text{color:var(--ink2);}
body.dark .outreach-text{color:var(--ink2);}
.add-outreach-area{margin-top:8px;}
.add-outreach-area input[type="date"]{
  font-family:var(--mono);font-size:10px;padding:5px 8px;
  border:1px solid var(--rule2);background:var(--paper);color:var(--ink);
  width:100%;margin-bottom:4px;outline:none;
}
body.dark .add-outreach-area input{background:#2c2c2c;border-color:#484848;color:var(--ink);}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;
  display:none;align-items:center;justify-content:center;
}
.modal-overlay.open{display:flex;}
body.dark .modal-overlay{background:rgba(0,0,0,0.7);}
.modal{
  background:var(--paper);width:580px;max-width:95vw;max-height:90vh;
  overflow-y:auto;border:1px solid var(--rule);box-shadow:0 8px 40px rgba(0,0,0,0.2);
}
body.dark .modal{background:#242424;border:none;}
.modal-title{
  font-family:var(--serif);font-size:18px;padding:18px 22px 14px;
  border-bottom:1px solid var(--rule);
}
body.dark .modal-title{color:var(--ink);border-bottom-color:#363636;}
.modal-body{padding:18px 22px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.form-row.full{grid-template-columns:1fr;}
.form-field{display:flex;flex-direction:column;gap:4px;}
.form-label{font-family:var(--mono);font-size:9px;letter-spacing:0.8px;text-transform:uppercase;color:var(--ink3);}
body.dark .form-label{color:var(--ink2);}
.form-input,.form-select,.form-textarea{
  font-family:var(--sans);font-size:12px;padding:7px 9px;
  border:1px solid var(--rule2);background:var(--paper);color:var(--ink);outline:none;
}
.form-textarea{resize:vertical;min-height:70px;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold-border);}
body.dark .form-input,body.dark .form-select,body.dark .form-textarea{background:#2c2c2c;border-color:#484848;color:var(--ink);}
.form-sec{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink4);padding:10px 0 6px;border-bottom:1px solid var(--rule);margin-bottom:12px;}
body.dark .form-sec{border-bottom-color:#363636;}
.modal-actions{
  display:flex;justify-content:flex-end;gap:8px;padding:14px 22px;
  border-top:1px solid var(--rule);
}
body.dark .modal-actions{border-top-color:#363636;}
.btn-cancel{font-family:var(--mono);font-size:10px;padding:8px 18px;background:var(--paper2);border:1px solid var(--rule2);color:var(--ink3);cursor:pointer;}
.btn-save{font-family:var(--mono);font-size:10px;padding:8px 18px;background:var(--gold-border);color:#141414;border:1px solid var(--gold-border);cursor:pointer;}
.btn-save:hover{background:#5aab7822;/*b860;}
.btn-delete{font-family:var(--mono);font-size:10px;padding:8px 18px;background:none;border:1px solid rgba(192,57,43,0.3);color:var(--red);cursor:pointer;margin-right:auto;}
body.dark .btn-cancel{background:#2c2c2c;border-color:#484848;color:var(--ink2);}
body.dark .btn-save{background:var(--gold-border);color:#141414;}

/* ── TOAST ── */
.toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:300;}
.toast{
  background:var(--paper);border:1px solid var(--rule);box-shadow:var(--shadow);
  padding:10px 14px;display:flex;align-items:flex-start;gap:10px;min-width:240px;
  font-family:var(--sans);font-size:12px;
}
body.dark .toast{background:#2c2c2c;border-color:#484848;color:var(--ink);}
.toast-ico{color:var(--green);font-size:14px;margin-top:1px;}
.toast-title{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--gold-border);margin-bottom:2px;}
.toast-msg{color:var(--ink3);}

/* Empty state */
.empty-stage{font-family:var(--mono);font-size:9px;color:var(--ink5);text-align:center;padding:16px 8px;}
</style>
</head>
<body>

<style>
.paq-nav{background:#141414;border-bottom:2px solid #5aab78;display:flex;align-items:center;height:38px;position:sticky;top:0;z-index:200;padding:0 6px;gap:0;}
.paq-nav-btn{
  display:flex;align-items:center;justify-content:center;
  text-decoration:none;padding:0 13px;height:100%;
  border:none;background:none;cursor:pointer;
  transition:opacity 0.15s;
}
.paq-nav:hover .paq-nav-btn svg{ opacity:0.25; }
.paq-nav-btn:hover svg{ opacity:1 !important; }
.paq-nav-btn.active svg{ opacity:1 !important; }
.paq-nav-ico{display:flex;align-items:center;justify-content:center;}
.paq-nav-btn svg{ opacity:0.55; transition:opacity 0.15s; }

/* ── RESEARCH VIEW ─────────────────────────────── */
.research-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:20px;padding:20px 0;}
.rcard{background:var(--paper);border:1px solid var(--rule);}
.rcard-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--rule);display:flex;align-items:flex-start;gap:10px;}
.rcard-name{font-family:var(--serif);font-size:17px;color:var(--ink);line-height:1.2;flex:1;}
.rcard-alias{font-family:var(--mono);font-size:9px;color:var(--ink4);margin-top:2px;}
.rcard-body{padding:12px 16px;}
.rcard-section{margin-bottom:14px;}
.rcard-section-title{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink4);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.rcard-section-title button{font-family:var(--mono);font-size:7.5px;padding:2px 7px;background:none;border:1px solid var(--rule2);color:var(--ink4);cursor:pointer;}
.rcard-section-title button:hover{border-color:var(--ink3);color:var(--ink2);}
/* Links section */
.rlinks-list{display:flex;flex-direction:column;gap:4px;margin-bottom:6px;}
.rlink-row{display:flex;align-items:center;gap:6px;}
.rlink-badge{font-family:var(--mono);font-size:7.5px;padding:1px 6px;border:1px solid;flex-shrink:0;min-width:52px;text-align:center;}
.rlink-badge.spotify{color:#1db954;border-color:rgba(29,185,84,0.3);}
.rlink-badge.muso{color:#4a9ef5;border-color:rgba(74,158,245,0.3);}
.rlink-badge.genius{color:#d4af5a;border-color:rgba(212,175,90,0.3);}
.rlink-badge.playlist{color:#9b6fd4;border-color:rgba(155,111,212,0.3);}
.rlink-badge.other{color:var(--ink4);border-color:var(--rule2);}
.rlink-url{font-family:var(--mono);font-size:8px;color:var(--ink4);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rlink-del{background:none;border:none;cursor:pointer;color:var(--ink5);font-size:10px;padding:0 3px;flex-shrink:0;}
.rlink-del:hover{color:var(--red);}
.rlink-input{display:flex;gap:6px;margin-top:4px;}
.rlink-input textarea{font-family:var(--mono);font-size:9px;padding:5px 8px;border:1px solid var(--rule2);background:var(--paper);color:var(--ink);flex:1;resize:none;height:54px;line-height:1.5;}
.rlink-input button{font-family:var(--mono);font-size:8px;padding:4px 10px;background:none;border:1px solid var(--rule2);color:var(--ink3);cursor:pointer;white-space:nowrap;align-self:flex-end;}
.rlink-input button:hover{border-color:var(--ink3);color:var(--ink);}
/* Sync bar */
.rsync-bar{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--rule);margin-bottom:12px;}
.rsync-btn{font-family:var(--mono);font-size:8px;padding:4px 12px;background:none;border:1px solid var(--gold-border);color:var(--gold-border);cursor:pointer;}
.rsync-btn:hover{background:var(--gold-border);color:#141414;}
.rsync-btn:disabled{opacity:0.4;cursor:default;}
.rsync-status{font-family:var(--mono);font-size:8px;color:var(--ink4);flex:1;}
.rsync-last{font-family:var(--mono);font-size:7.5px;color:var(--ink5);}
/* Threshold */
.rthresh-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.rthresh-row label{font-family:var(--mono);font-size:8.5px;color:var(--ink3);flex:1;}
.rthresh-row input{font-family:var(--mono);font-size:9px;padding:3px 6px;border:1px solid var(--rule2);background:var(--paper);color:var(--ink);width:100px;text-align:right;}
.rthresh-alert{font-family:var(--mono);font-size:8px;padding:5px 8px;background:var(--amber-bg);border:1px solid #f0c070;color:var(--amber);margin-top:4px;}
.rthresh-alert.hit{background:var(--red-bg);border-color:#e8a8a0;color:var(--red);}
/* Instagram */
.ig-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.ig-count{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--ink);}
.ig-growth{font-family:var(--mono);font-size:10px;}
.ig-growth.up{color:var(--green);}.ig-growth.down{color:var(--red);}.ig-growth.flat{color:var(--ink4);}
.ig-periods{display:flex;gap:4px;margin-bottom:8px;}
.ig-period-btn{font-family:var(--mono);font-size:8px;padding:2px 7px;background:none;border:1px solid var(--rule2);color:var(--ink4);cursor:pointer;}
.ig-period-btn.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.ig-snapshot-row{display:flex;gap:8px;margin-bottom:3px;}
.ig-snapshot-date{font-family:var(--mono);font-size:8px;color:var(--ink4);min-width:80px;}
.ig-snapshot-val{font-family:var(--mono);font-size:10px;color:var(--ink2);}
/* Songs */
.song-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--rule);font-family:var(--mono);font-size:9.5px;}
.song-row:last-child{border-bottom:none;}
.song-title{flex:1;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.song-year{color:var(--ink4);font-size:8.5px;flex-shrink:0;width:34px;}
.song-yt{color:var(--ink3);font-size:8.5px;flex-shrink:0;width:60px;text-align:right;}
.song-sp{color:var(--ink3);font-size:8.5px;flex-shrink:0;width:60px;text-align:right;}
.song-mil{color:var(--green);}
.research-add-btn{font-family:var(--mono);font-size:9px;padding:6px 16px;background:none;border:1px solid var(--rule2);color:var(--ink3);cursor:pointer;margin-bottom:20px;}
.research-add-btn:hover{border-color:var(--ink3);color:var(--ink);}
body.dark .rcard{background:var(--paper2);}
body.dark .rlink-input textarea{background:#2c2c2c;border-color:#404040;color:var(--ink);}
body.dark .rthresh-row input{background:#2c2c2c;border-color:#404040;color:var(--ink);}
body.dark .ig-period-btn.on{background:#444;color:var(--gold-border);border-color:#666;}

<script>
const SB_URL = 'https://jbcqoxiygkdxoaulrhbk.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpiY3FveGl5Z2tkeG9hdWxyaGJrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyOTA1MDQsImV4cCI6MjA4ODg2NjUwNH0.IPB_7u7hU53aUI6wS-fYXLOe3_7uCAjMhDwXxQZR4s8';
const SB_HEADERS = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`};
const TODAY_STR = new Date().toISOString().split('T')[0];

let prospects = [];
let nextId = 1;
let searchQ = '';
let currentView = 'pipeline';
let editingId = null;
let currentDetailId = null;

const STAGES = ['new','research','outreach','negotiating','signed','passed'];
const STAGE_LABELS = {new:'New',research:'Research',outreach:'Outreach',negotiating:'Negotiating',signed:'Signed',passed:'Passed'};

async function sbFetch(path, opts={}){
  const res = await fetch(`${SB_URL}/rest/v1/${path}`,{headers:SB_HEADERS,...opts});
  if(!res.ok){const e=await res.text();throw new Error(e);}
  return res.status===204?null:res.json();
}

async function dbLoad(){
  showLoader(true);
  try{
    const rows = await sbFetch('prospects?select=id,data&order=id');
    if(rows&&rows.length>0){
      prospects = rows.map(r=>({id:r.id,...r.data}));
      nextId = Math.max(...prospects.map(p=>p.id))+1;
    }
  }catch(e){
    console.error('Load failed:',e);
    toast('Offline','Working with local data only.');
  }
  showLoader(false);
  renderAll();
}

async function dbSave(p){
  try{
    await sbFetch('prospects',{
      method:'POST',
      headers:{...SB_HEADERS,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({id:p.id,data:p})
    });
  }catch(e){toast('Save Error','Change may not have saved.');}
}

async function dbDelete(id){
  try{await sbFetch(`prospects?id=eq.${id}`,{method:'DELETE'});}
  catch(e){toast('Delete Error','Could not delete.');}
}

function showLoader(on){
  let el=document.getElementById('db-loader');
  if(!el){el=document.createElement('div');el.id='db-loader';el.style.cssText='position:fixed;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#5aab78,#6abf88,#5aab78);z-index:999;transition:opacity .3s';document.body.prepend(el);}
  el.style.opacity=on?'1':'0';
}

function fmtNum(n){
  if(!n) return '—';
  const num = parseInt(String(n).replace(/[^0-9]/g,''));
  if(isNaN(num)) return n;
  if(num>=1000000) return (num/1000000).toFixed(1)+'M';
  if(num>=1000) return (num/1000).toFixed(0)+'K';
  return num.toString();
}

function fmtDate(d){
  if(!d) return '—';
  const dt = new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function daysSince(d){
  if(!d) return null;
  return Math.floor((Date.now()-new Date(d+'T00:00:00'))/(86400000));
}

function getFiltered(){
  let d=[...prospects];
  const q=searchQ.toLowerCase();
  if(q) d=d.filter(p=>(p.name+' '+(p.alias||'')).toLowerCase().includes(q));
  const st=document.getElementById('filter-stage').value;
  const pri=document.getElementById('filter-priority').value;
  const genre=document.getElementById('filter-genre').value;
  if(st) d=d.filter(p=>p.stage===st);
  if(pri) d=d.filter(p=>p.priority===pri);
  if(genre) d=d.filter(p=>p.genre===genre);
  return d;
}

function renderAll(){
  renderStats();
  if(currentView==='pipeline') renderPipeline();
  else if(currentView==='research') renderResearch();
  else renderList();
}

function renderStats(){
  const all=prospects;
  document.getElementById('stat-total').textContent=all.length;
  document.getElementById('stat-outreach').textContent=all.filter(p=>p.stage==='outreach').length;
  document.getElementById('stat-negotiating').textContent=all.filter(p=>p.stage==='negotiating').length;
  const thisYear=new Date().getFullYear();
  document.getElementById('stat-signed').textContent=all.filter(p=>p.stage==='signed'&&p.contactDate&&new Date(p.contactDate).getFullYear()===thisYear).length;
}

function renderPipeline(){
  const data=getFiltered();
  const wrap=document.getElementById('pipeline-view');
  wrap.innerHTML=STAGES.map(stage=>{
    const cards=data.filter(p=>p.stage===stage);
    return `<div class="stage-col stage-${stage}">
      <div class="stage-hdr">
        <span class="stage-title">${STAGE_LABELS[stage]}</span>
        <span class="stage-count">${cards.length}</span>
      </div>
      <div class="stage-cards">
        ${cards.length?cards.map(p=>makeCard(p)).join(''):`<div class="empty-stage">No prospects</div>`}
      </div>
    </div>`;
  }).join('');
}

function makeCard(p){
  const priCls=p.priority==='high'?'priority-high':p.priority==='low'?'priority-low':'priority-med';
  const days=daysSince(p.contactDate);

    prospects[i]={...prospects[i],...data};

    prospects.push(p);
    saved=p;
    toast('Added',`${name} added to pipeline.`);

  closeModal();

  if(window._pendingSpotifyTracks && !editingId){
    const pt = window._pendingSpotifyTracks;
    if(!saved.research) saved.research = {};
    saved.research.spotifyUrl = pt.url;
    saved.research.igSnapshots = saved.research.igSnapshots || [];
    saved.research.songs = saved.research.songs || [];
    // Add Spotify followers as first IG-style snapshot under a separate key
    saved.research.spFollowers = pt.followers;

// ── SOLAR AUTO DARK MODE ─────────────────────────────────────────────
const SOLAR_LAT = 41.8781;
const SOLAR_LNG = -87.6298;
const SOLAR_TZ  = 'America/Chicago';

function solarTime(date, isRise){
  const rad = Math.PI / 180;
  const localStr = new Date(date).toLocaleDateString('en-CA', {timeZone: SOLAR_TZ});
  const [yr, mo, dy] = localStr.split('-').map(Number);
  const A = Math.floor((14 - mo) / 12);
  const Y = yr + 4800 - A;
  const M = mo + 12 * A - 3;
  const JD = dy + Math.floor((153*M+2)/5) + 365*Y + Math.floor(Y/4) - Math.floor(Y/100) + Math.floor(Y/400) - 32045 - 0.5;
  const n   = JD - 2451545.0;
  const L   = ((280.460 + 0.9856474 * n) % 360 + 360) % 360;
  const g   = ((357.528 + 0.9856003 * n) % 360 + 360) % 360;
  const lam = L + 1.915 * Math.sin(g * rad) + 0.020 * Math.sin(2 * g * rad);
  const eps = 23.439 - 0.0000004 * n;
  const sinDec = Math.sin(eps * rad) * Math.sin(lam * rad);
  const dec = Math.asin(sinDec);
  const cosHA = (Math.cos(90.833 * rad) - Math.sin(SOLAR_LAT * rad) * sinDec)
              / (Math.cos(SOLAR_LAT * rad) * Math.cos(dec));
  if(cosHA < -1 || cosHA > 1) return null;
  const HA = Math.acos(Math.max(-1, Math.min(1, cosHA))) / rad;
  const EoT = 4 * (L - 0.0057183 - lam);
  const solarNoon = 720 - 4 * SOLAR_LNG - EoT;
  const eventMin = isRise ? solarNoon - HA * 4 : solarNoon + HA * 4;
  const utcBase = new Date(localStr + 'T00:00:00Z');
  return new Date(utcBase.getTime() + eventMin * 60000);
}

let _darkOverride = null;

function applyAutoTheme(){
  const now = new Date();
  const rise = solarTime(now, true);
  const set  = solarTime(now, false);
  const isDark = _darkOverride !== null ? _darkOverride
               : (!rise || !set || now < rise || now >= set);
  document.body.classList.toggle('dark', isDark);
  const btn = document.getElementById('dark-toggle-btn');
  if(!btn) return;
  const fmt = t => t ? t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',timeZone:SOLAR_TZ}) : '--';
  if(_darkOverride !== null){
    btn.textContent = isDark ? '◑ MANUAL' : '◐ MANUAL';
    btn.title = 'Manual override — click again to return to auto';
  } else {
    btn.textContent = isDark ? '◑ AUTO' : '◐ AUTO';
    btn.title = 'Auto (Chicago) · Sunrise ' + fmt(rise) + ' · Sunset ' + fmt(set);
  }
}

function toggleDark(){
  if(_darkOverride === null){
    _darkOverride = !document.body.classList.contains('dark');
  } else {
    _darkOverride = null;
  }
  applyAutoTheme();
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', applyAutoTheme);
} else {
  applyAutoTheme();
}
setInterval(applyAutoTheme, 60000);

const SPOTIFY_CLIENT_ID = '6416b3fde21c4883b006daeb066c3325';
let _spotifyToken = null;
let _spotifyTokenExp = 0;
const THIS_YEAR = new Date().getFullYear();
const CUTOFF_YEAR = THIS_YEAR - 3;
const SYNC_INTERVAL_DAYS = 7;
const SYNC_KEY = 'paq-research-last-sync';

// Publishing credits that carry royalties
const PUB_CREDITS = ['Composer','Lyricist','Primary Artist','Producer','Featured Artist',
  'Executive Producer','Co-Writer','Co-Producer','Vocals','Vocalist','Songwriter',
  'Writer','Remix Artist'];
const NON_PUB = ['Background Vocals','Miscellaneous','Drums','Engineer','Guitar',
  'Instrumentation','Mixing','Bass','Ensemble','Keyboard','Misc Vox','Programmer',
  'Percussion','Strings','Horns','Arranger'];

function getSpotifySecret(){ return localStorage.getItem('paq-spotify-secret')||''; }

async function getSpotifyToken(){
  if(_spotifyToken && Date.now()<_spotifyTokenExp) return _spotifyToken;
  const secret=getSpotifySecret(); if(!secret) return null;
  try{
    const res=await fetch('https://accounts.spotify.com/api/token',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded','Authorization':'Basic '+btoa(SPOTIFY_CLIENT_ID+':'+secret)},
      body:'grant_type=client_credentials'
    });
    if(!res.ok) return null;
    const data=await res.json();
    _spotifyToken=data.access_token;
    _spotifyTokenExp=Date.now()+(data.expires_in-60)*1000;
    return _spotifyToken;
  }catch(e){return null;}
}

function fmtNum(n){
  if(!n&&n!==0)return '—';
  n=parseInt(n)||0;
  if(n>=1000000)return (n/1000000).toFixed(1)+'M';
  if(n>=1000)return (n/1000).toFixed(0)+'K';
  return n.toString();
}

function igGrowth(snapshots,period){
  if(!snapshots||snapshots.length<2) return null;
  const sorted=[...snapshots].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const latest=sorted[sorted.length-1];
  const daysMap={'1m':30,'3m':90,'6m':180,'1y':365};
  const days=daysMap[period]||30;
  const cutoff=new Date(latest.date); cutoff.setDate(cutoff.getDate()-days);
  const old=sorted.slice().reverse().find(s=>new Date(s.date)<=cutoff);
  if(!old) return null;
  const diff=latest.count-old.count;
  const pct=old.count>0?(diff/old.count*100).toFixed(1):null;
  return{diff,pct,from:old.count,to:latest.count};
}

function detectLinkType(url){
  if(!url) return 'other';
  if(url.includes('spotify.com/artist')) return 'spotify';
  if(url.includes('spotify.com/playlist')) return 'playlist';
  if(url.includes('muso.ai')||url.includes('credits.muso')) return 'muso';
  if(url.includes('genius.com')) return 'genius';
  return 'other';
}

// ── THRESHOLD ALERTS ─────────────────────────────────────────────────
function checkThresholds(p){
  const r=p.research||{};
  const songs=r.songs||[];
  const thresh=r.thresholds||{};
  const alerts=[];

  // Single song over 1M
  songs.forEach(s=>{
    if((s.spStreams||0)>=1000000&&!(r.alertedSongs||[]).includes(s.title)){
      alerts.push({type:'song1m',msg:'"'+s.title+'" crossed 1M streams ('+fmtNum(s.spStreams)+')'});
    }
  });

  // Total catalog threshold
  const totalStreams=songs.reduce((sum,s)=>sum+(s.spStreams||0),0);
  if(thresh.totalCatalog&&totalStreams>=thresh.totalCatalog){
    alerts.push({type:'totalCatalog',msg:'Total catalog hit '+fmtNum(totalStreams)+' streams (threshold: '+fmtNum(thresh.totalCatalog)+')'});
  }

  // Qualified catalog (only songs over 1M)
  const qualStreams=songs.filter(s=>(s.spStreams||0)>=1000000).reduce((sum,s)=>sum+(s.spStreams||0),0);
  if(thresh.qualCatalog&&qualStreams>=thresh.qualCatalog){
    alerts.push({type:'qualCatalog',msg:'Qualified catalog (songs >1M) hit '+fmtNum(qualStreams)+' streams (threshold: '+fmtNum(thresh.qualCatalog)+')'});
  }

  return{alerts,totalStreams,qualStreams};
}

// ── SYNC ENGINE ──────────────────────────────────────────────────────
// Returns year from track page via iframe
function getYearFromTrackPage(trackId){
  return new Promise(resolve=>{
    if(!trackId){resolve(0);return;}
    const fr=document.createElement('iframe');
    fr.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0';
    fr.src='https://open.spotify.com/track/'+trackId;
    let done=false;
    fr.onload=()=>{
      if(done)return;done=true;
      try{
        const txt=fr.contentDocument?.body?.innerText||'';
        const m1=txt.match(/(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d+,\s+(\d{4})/);
        if(m1){resolve(parseInt(m1[2]));fr.remove();return;}
        const m2=txt.match(/•(\d{4})•\d+:\d+/);
        if(m2){resolve(parseInt(m2[1]));fr.remove();return;}
      }catch(e){}
      resolve(0);fr.remove();
    };
    fr.onerror=()=>{if(!done){done=true;resolve(0);fr.remove();}};
    document.body.appendChild(fr);
    setTimeout(()=>{if(!done){done=true;resolve(0);try{fr.remove();}catch(e){}}},7000);
  });
}

// Sync a single URL — returns array of song objects
function syncUrl(url){
  return new Promise(resolve=>{
    const type=detectLinkType(url);
    const fr=document.createElement('iframe');
    fr.style.cssText='position:fixed;top:-9999px;left:-9999px;width:800px;height:600px;opacity:0';
    fr.src=url;
    let done=false;
    const finish=(songs)=>{
      if(done)return;done=true;
      fr.remove();
      resolve(songs);
    };
    fr.onload=async()=>{
      if(done)return;
      try{
        await new Promise(r=>setTimeout(r,2000)); // wait for JS render
        const doc=fr.contentDocument;
        if(!doc){finish([]);return;}
        const songs=[];

        if(type==='spotify'||type==='playlist'){
          // Read tracklist rows
          const rows=[...doc.querySelectorAll('[data-testid="tracklist-row"]')];
          // For artist page — click See more first
          const seeMore=[...doc.querySelectorAll('button')].find(b=>b.textContent.trim()==='See more');
          if(seeMore){seeMore.click();await new Promise(r=>setTimeout(r,600));}
          const rows2=[...doc.querySelectorAll('[data-testid="tracklist-row"]')];
          const activeRows=rows2.length>rows.length?rows2:rows;
          for(const row of activeRows.slice(0,10)){
            const title=row.querySelector('[data-testid="internal-track-link"]')?.textContent?.trim();
            const plays=row.querySelector('[aria-colindex="3"]')?.textContent?.trim();
            const trackLink=row.querySelector('a[href*="/track/"]')?.href||'';
            const trackId=trackLink.match(/track\/([A-Za-z0-9]+)/)?.[1]||'';
            if(title&&trackId){
              const streams=parseInt((plays||'').replace(/[^0-9]/g,''))||0;
              songs.push({title,streams,trackId,spotifyUrl:trackLink,year:0,credits:type==='spotify'?'Primary Artist':'Playlist'});
            }
          }
          // Monthly listeners for artist page
          const listenersEl=[...doc.querySelectorAll('span')].find(s=>s.textContent.includes('monthly listeners'));
          const ml=parseInt((listenersEl?.textContent||'').replace(/[^0-9]/g,''))||0;
          if(ml) songs._monthlyListeners=ml;

        }else if(type==='muso'){
          const tbRows=[...doc.querySelectorAll('tbody tr')];
          tbRows.forEach(row=>{
            const parts=row.innerText.split('\n').map(s=>s.trim()).filter(Boolean);
            if(parts.length<3)return;
            const title=parts[1];
            const dateStr=parts.find(p=>/\b(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\s+\d+,\s+\d{4}/.test(p));
            const year=dateStr?parseInt(dateStr.split(', ').pop()):0;
            const credits=parts.filter(p=>
              [...PUB_CREDITS,...NON_PUB].some(c=>p===c||p.startsWith(c))
            );
            const hasPub=credits.length===0||credits.some(c=>PUB_CREDITS.some(p=>c===p||c.startsWith(p)));
            const onlyNonPub=credits.length>0&&credits.every(c=>NON_PUB.some(n=>c===n||c.startsWith(n)));
            if(onlyNonPub)return;
            if(!hasPub)return;
            if(year&&year<CUTOFF_YEAR)return;
            const spotifyLink=[...row.querySelectorAll('a')].find(a=>a.href?.includes('spotify.com/track'))?.href||'';
            const trackId=spotifyLink.match(/track\/([A-Za-z0-9]+)/)?.[1]||'';
            if(title) songs.push({title,year:year||0,streams:0,trackId,spotifyUrl:spotifyLink,credits:credits.slice(0,3).join(', ')});
          });
        }
        finish(songs);
      }catch(e){finish([]);}
    };
    fr.onerror=()=>finish([]);
    document.body.appendChild(fr);
    setTimeout(()=>finish([]),15000);
  });
}

// Full sync for one prospect
async function syncProspect(p, onProgress){
  const r=p.research||{};
  const links=r.sourceLinks||[];
  if(links.length===0) return false;

  let allSongs=[];
  let monthlyListeners=r.spFollowers||0;

  for(let i=0;i<links.length;i++){
    const url=links[i];
    if(onProgress) onProgress('Syncing '+(i+1)+'/'+links.length+': '+detectLinkType(url).toUpperCase()+'…');
    const songs=await syncUrl(url);
    if(songs._monthlyListeners) monthlyListeners=songs._monthlyListeners;
    allSongs.push(...songs);
    await new Promise(r=>setTimeout(r,500));
  }

  // For songs with trackId but no year, fetch year
  const noYear=allSongs.filter(s=>s.year===0&&s.trackId);
  for(let i=0;i<Math.min(noYear.length,10);i++){
    if(onProgress) onProgress('Fetching release years… ('+(i+1)+'/'+Math.min(noYear.length,10)+')');
    noYear[i].year=await getYearFromTrackPage(noYear[i].trackId);
    await new Promise(r=>setTimeout(r,200));
  }

  // Filter to last 3 years
  const filtered=allSongs.filter(s=>s.year===0||s.year>=CUTOFF_YEAR);

  // Merge with existing songs
  if(!p.research) p.research={};
  if(!p.research.songs) p.research.songs=[];
  filtered.forEach(s=>{
    const ex=p.research.songs.find(e=>e.title.toLowerCase()===s.title.toLowerCase());
    if(ex){
      if(s.streams) ex.spStreams=s.streams;
      if(s.year) ex.year=s.year;
      if(s.trackId) ex.trackId=s.trackId;
      if(s.credits) ex.credits=s.credits;
    }else{
      p.research.songs.push({title:s.title,year:s.year||0,ytViews:0,spStreams:s.streams||0,trackId:s.trackId||'',spotifyUrl:s.spotifyUrl||'',credits:s.credits||''});
    }
  });

  if(monthlyListeners) p.research.spFollowers=monthlyListeners;
  p.research.lastSync=new Date().toLocaleDateString('en-CA');
  await dbSave(p);
  return true;
}

// ── AUTO SYNC ────────────────────────────────────────────────────────
async function runAutoSync(){
  const last=localStorage.getItem(SYNC_KEY);
  if(last){
    const daysSince=(Date.now()-new Date(last))/(86400000);
    if(daysSince<SYNC_INTERVAL_DAYS) return;
  }
  const rps=researchProspects().filter(p=>(p.research?.sourceLinks||[]).length>0);
  if(rps.length===0) return;
  console.log('PAQ: Running auto-sync for',rps.length,'research prospects…');
  for(const p of rps){
    await syncProspect(p,null);
    await new Promise(r=>setTimeout(r,1000));
  }
  localStorage.setItem(SYNC_KEY,new Date().toLocaleDateString('en-CA'));
  renderResearch();
}

  html += '<div class="rthresh-row"><label>Total catalog streams</label>'
    + '<input type="text" id="rth-total-'+p.id+'" value="'+(thresh.totalCatalog?fmtNum(thresh.totalCatalog):'')+'" placeholder="e.g. 10M" onblur="saveThreshold('+p.id+String.fromCharCode(44)+String.fromCharCode(39)+'totalCatalog'+String.fromCharCode(39)+String.fromCharCode(44)+'this.value)">'
    + '</div>'
    + '<div class="rthresh-row"><label>Qualified catalog (songs &gt;1M only)</label>'

    + '</div></div>';
  return html;
}

// ── LINK MANAGEMENT ──────────────────────────────────────────────────
function saveLinkInput(pid){
  const p=prospects.find(x=>x.id===pid); if(!p) return;
  const el=document.getElementById('rlink-input-'+pid); if(!el) return;
  const raw=el.value.trim(); if(!raw) return;
  const newLinks=raw.split('\n').map(s=>s.trim()).filter(s=>s.startsWith('http'));
  if(newLinks.length===0){alert('Please enter valid URLs starting with http');return;}
  if(!p.research) p.research={};
  if(!p.research.sourceLinks) p.research.sourceLinks=[];
  newLinks.forEach(url=>{
    if(!p.research.sourceLinks.includes(url)) p.research.sourceLinks.push(url);
  });
  dbSave(p);
  renderResearch();
}

function removeLink(pid,idx){
  const p=prospects.find(x=>x.id===pid); if(!p||!p.research?.sourceLinks) return;
  p.research.sourceLinks.splice(idx,1);
  dbSave(p);
  renderResearch();
}

function saveThreshold(pid,key,val){
  const p=prospects.find(x=>x.id===pid); if(!p) return;
  if(!p.research) p.research={};
  if(!p.research.thresholds) p.research.thresholds={};
  // Parse value like "10M", "500K", "1000000"
  const clean=val.trim().toUpperCase();
  let num=0;
  if(clean.endsWith('M')) num=parseFloat(clean)*1000000;
  else if(clean.endsWith('K')) num=parseFloat(clean)*1000;
  else num=parseInt(clean.replace(/[^0-9]/g,''))||0;
  if(num>0) p.research.thresholds[key]=num;
  else delete p.research.thresholds[key];
  dbSave(p);
}

// ── ONE PROSPECT MANUAL SYNC ─────────────────────────────────────────
async function syncOne(pid){
  const p=prospects.find(x=>x.id===pid); if(!p) return;
  const btn=document.getElementById('rsync-btn-'+pid);
  const st=document.getElementById('rsync-st-'+pid);
  if(btn){btn.disabled=true;btn.textContent='Syncing…';}
  const ok=await syncProspect(p,(msg)=>{if(st)st.textContent=msg;});
  if(btn){btn.disabled=false;btn.textContent='⟳ Sync All';}
  if(st)st.textContent=ok?'✓ Done':'No links to sync';
  renderResearch();
}

  p.research.igPeriod=period;
  dbSave(p);renderResearch();

function openIgManual(pid){
  const countStr=prompt('Enter current Instagram follower count:');
  if(!countStr)return;
  const count=parseInt(countStr.replace(/[^0-9]/g,''));
  if(isNaN(count))return alert('Enter a valid number.');
  addIgSnapshot(pid,count);
}
function addIgSnapshot(pid,count){
  const p=prospects.find(x=>x.id===pid); if(!p)return;
  if(!p.research)p.research={};
  if(!p.research.igSnapshots)p.research.igSnapshots=[];
  const today=new Date().toLocaleDateString('en-CA');
  const ex=p.research.igSnapshots.find(s=>s.date===today);
  if(ex)ex.count=count; else p.research.igSnapshots.push({date:today,count});
  dbSave(p);renderResearch();
}
async function openIgScrape(pid){
  const p=prospects.find(x=>x.id===pid); if(!p)return;
  if(!p.instagram){
    const url=prompt('Enter Instagram profile URL:');
    if(!url)return;
    p.instagram=url;
  }
  const username=p.instagram.replace(/.*instagram\.com\//,'').replace(/\//,'').replace(/@/,'');
  try{
    const res=await fetch('https://www.instagram.com/'+username+'/?__a=1&__d=dis',{mode:'cors'});
    if(res.ok){
      const json=await res.json();
      const count=json?.graphql?.user?.edge_followed_by?.count||json?.data?.user?.edge_followed_by?.count;
      if(count){addIgSnapshot(pid,count);return;}
    }
  }catch(e){}
  const fallback=prompt('Auto-fetch failed. Enter follower count manually for @'+username+':');
  if(fallback){const count=parseInt(fallback.replace(/[^0-9]/g,''));if(!isNaN(count))addIgSnapshot(pid,count);}
}

  const ytStr=prompt('YouTube views (blank if unknown):');

  const p=prospects.find(x=>x.id===pid); if(!p)return;
  if(!p.research)p.research={};
  if(!p.research.songs)p.research.songs=[];
  p.research.songs.push({title:title.trim(),year:yr,ytViews,spStreams,trackId:'',spotifyUrl:'',credits:'Manual'});
  p.research.songs.sort((a,b)=>(b.spStreams||0)-(a.spStreams||0));
  dbSave(p);renderResearch();
}
function removeSong(pid,songIdx){
  const p=prospects.find(x=>x.id===pid); if(!p||!p.research?.songs)return;
  const visible=p.research.songs.filter(s=>s.year===0||s.year>=CUTOFF_YEAR).sort((a,b)=>(b.spStreams||0)-(a.spStreams||0));
  const song=visible[songIdx];
  if(!song||!confirm('Remove "'+song.title+'"?'))return;
  const idx=p.research.songs.indexOf(song);
  p.research.songs.splice(idx,1);
  dbSave(p);renderResearch();
}

// ── INIT ─────────────────────────────────────────────────────────────
setTimeout(()=>runAutoSync(),5000); // run auto-sync 5s after page load


dbLoad();
</script>
</body>
